<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pakdu Duel Mode</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <main class="container home-layout">
      <section class="card">
        <div class="hero-badge">DUEL MODE</div>
        <h1>⚔️ Attack &amp; Survive</h1>
        <p class="muted">ตอบถูก = ตัดคะแนนคู่ต่อสู้ / ตอบผิดติดกัน 3 ครั้ง = โดนหักคะแนนตัวเอง</p>

        <div class="duel-setup-grid">
          <label>ชื่อผู้เล่น
            <input id="duelPlayerName" type="text" minlength="2" placeholder="เช่น แชมป์" />
          </label>
          <label>บททดสอบ (เลือกจากชื่อ)
            <select id="duelCourseId">
              <option value="">-- เลือกบททดสอบ --</option>
            </select>
          </label>
          <label>เวลา (Host)
            <select id="duelDuration">
              <option value="120">2 นาที</option>
              <option value="180">3 นาที</option>
            </select>
          </label>
          <label>Room ID (สำหรับ "เข้าห้อง")
            <input id="duelRoomId" type="text" inputmode="numeric" maxlength="4" placeholder="กรอกเฉพาะตอนเข้าห้อง" />
          </label>
        </div>

        <div class="quiz-actions">
          <button id="createRoomBtn" class="btn" type="button">Host</button>
          <button id="joinRoomBtn" class="btn btn-secondary" type="button">Join</button>
          <a class="btn" href="index.html">กลับหน้า Home</a>
        </div>

        <p id="duelStatusText" class="muted"></p>
      </section>

      <section class="card hidden" id="duelBattleSection">
        <div class="duel-mini-hud">
          <div class="duel-player-panel duel-player-panel--me">
            <div class="duel-hud-topline">
              <h3 id="meName">ฉัน</h3>
              <span id="duelTimerText">00:00</span>
            </div>
            <div class="duel-hp-bar"><div id="meHpFill"></div></div>
            <p id="meHpText">10 / 10</p>
          </div>
        </div>
        <small id="duelResultHint" class="duel-result-hint">รอเริ่มเกม...</small>

        <hr />

        <h2 id="duelQuestionTitle">กำลังรอคำถาม...</h2>
        <div id="duelChoices" class="choices"></div>

        <div class="quiz-actions">
          <button id="duelSubmitBtn" class="btn" type="button" disabled>ยืนยันคำตอบ</button>
          <button id="duelSkipBtn" class="btn btn-secondary" type="button">ข้ามข้อนี้</button>
        </div>
      </section>
    </main>

    <div id="duelEventModal" class="duel-event-modal hidden" aria-live="polite">
      <div class="duel-event-box">
        <div id="duelEventTitle" class="duel-event-title">⚔️ เปิดศึก!</div>
        <p id="duelEventText" class="duel-event-text">จงตอบให้ไวและแม่นที่สุด</p>
      </div>
    </div>

    <script type="module" src="js/duel.js"></script>
    <a class="home-fab" href="index.html" aria-label="กลับหน้าแรก">🏠</a>
  </body>
</html>

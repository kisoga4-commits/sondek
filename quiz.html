<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ทำแบบทดสอบ</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-gradient-to-b from-sky-100 to-violet-100 p-4 text-slate-900 md:p-8">
    <main class="mx-auto max-w-3xl space-y-4">
      <section id="introSection" class="rounded-3xl bg-white p-6 shadow-xl">
        <h1 id="quizTitle" class="text-3xl font-black text-indigo-700">กำลังโหลดแบบทดสอบ...</h1>
        <p id="quizDescription" class="mt-2 text-slate-600"></p>
        <p id="courseInfo" class="mt-3 rounded-xl bg-slate-100 px-3 py-2 text-sm text-slate-700"></p>

        <form id="entryForm" class="mt-5 space-y-3">
          <label class="block text-sm font-semibold">ชื่อผู้ทำแบบทดสอบ
            <input id="studentName" required minlength="2" class="mt-1 w-full rounded-xl border border-slate-300 px-4 py-3 text-lg" placeholder="เช่น กานต์" />
          </label>
          <button id="startBtn" class="w-full rounded-2xl bg-fuchsia-600 px-4 py-4 text-xl font-black text-white disabled:opacity-50" disabled>
            เริ่มทำข้อสอบ
          </button>
        </form>
      </section>

      <section id="quizSection" class="hidden rounded-3xl bg-white p-6 shadow-xl">
        <div class="mb-4 flex items-center justify-between text-sm font-semibold">
          <span id="progressText">ข้อ 1/10</span>
          <span id="scoreText">ตอบแล้ว 0</span>
        </div>
        <div class="h-2 rounded-full bg-slate-200"><div id="progressFill" class="h-2 rounded-full bg-indigo-500" style="width: 0%"></div></div>

        <div id="timerWrap" class="mt-4">
          <div class="mb-1 flex items-center justify-between text-sm font-bold text-rose-700">
            <span>⏳ เวลาต่อข้อ</span>
            <span id="timerText">30s</span>
          </div>
          <div class="h-3 rounded-full bg-rose-100">
            <div id="timerFill" class="h-3 rounded-full bg-gradient-to-r from-rose-500 to-orange-400 transition-all" style="width: 100%"></div>
          </div>
        </div>

        <h2 id="questionTitle" class="mt-5 text-2xl font-black"></h2>
        <p id="questionMeta" class="mt-1 text-sm font-semibold text-slate-600"></p>
        <p class="mt-2 rounded-xl bg-indigo-50 px-3 py-2 text-sm font-semibold text-indigo-700">ตอบทีละข้อให้ครบ หากพร้อมแล้วกด “ข้อต่อไป” ได้ทันที</p>
        <img id="questionMedia" alt="Question media" class="mt-3 hidden max-h-64 w-full rounded-xl border border-slate-200 object-cover" />
        <div id="choices" class="mt-4 space-y-3"></div>
        <button id="nextBtn" class="mt-5 w-full rounded-2xl bg-indigo-600 px-4 py-4 text-lg font-black text-white disabled:opacity-50">ข้อต่อไป</button>
      </section>

      <section id="resultSection" class="hidden rounded-3xl bg-white p-6 shadow-xl">
        <h2 class="text-3xl font-black text-emerald-600">สรุปผล</h2>
        <p id="resultScore" class="mt-2 text-xl font-bold"></p>
        <p id="resultMessage" class="mt-1 text-slate-600"></p>

        <div class="mt-4">
          <h3 class="font-bold">ตรวจคำตอบ</h3>
          <div id="answerReview" class="mt-2 space-y-2"></div>
        </div>

        <div class="mt-4 rounded-xl bg-slate-50 p-4">
          <h3 class="font-bold">อันดับคะแนน</h3>
          <ol id="leaderboardList" class="mt-2 list-decimal space-y-1 pl-5"></ol>
        </div>

        <div class="mt-5 grid gap-3 md:grid-cols-2">
          <a id="profileCta" href="#" target="_blank" rel="noreferrer" class="rounded-2xl bg-fuchsia-600 px-4 py-4 text-center text-lg font-black text-white">ดูโปรไฟล์ครู</a>
          <a id="enrollCta" href="#" target="_blank" rel="noreferrer" class="rounded-2xl bg-emerald-600 px-4 py-4 text-center text-lg font-black text-white">สมัครเรียน</a>
        </div>
      </section>
    </main>

    <script type="module" src="js/main.js"></script>
  </body>
</html>

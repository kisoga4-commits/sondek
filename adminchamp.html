<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Adminchamp - Quiz Builder</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <main class="container admin-layout">
      <section class="card">
        <h1>Adminchamp Quiz Builder</h1>
        <p class="muted">สร้างคอร์สและจัดการคลังข้อสอบ 20-40 ข้อ</p>

        <form id="courseForm" class="stack-form">
          <label>Course ID
            <input type="text" id="courseId" placeholder="course_01" required />
          </label>
          <label>ชื่อคอร์ส
            <input type="text" id="courseTitle" required />
          </label>
          <label>ชื่อครู
            <input type="text" id="tutorNameInput" required />
          </label>
          <label>URL รูปโปรไฟล์ครู
            <input type="url" id="tutorPhotoInput" required />
          </label>
          <label>คำแนะนำตัวครู
            <textarea id="tutorBioInput" rows="3" required></textarea>
          </label>
        </form>
      </section>

      <section class="card">
        <h2>เพิ่มข้อสอบ</h2>
        <p class="muted" id="questionCounter">ยังไม่มีข้อสอบ</p>

        <form id="questionForm" class="stack-form">
          <label>โจทย์
            <textarea id="qText" rows="3" required></textarea>
          </label>
          <label>ตัวเลือก ก
            <input type="text" id="choiceA" required />
          </label>
          <label>ตัวเลือก ข
            <input type="text" id="choiceB" required />
          </label>
          <label>ตัวเลือก ค
            <input type="text" id="choiceC" required />
          </label>
          <label>ตัวเลือก ง
            <input type="text" id="choiceD" required />
          </label>
          <label>เฉลย
            <select id="answer" required>
              <option value="0">ก</option>
              <option value="1">ข</option>
              <option value="2">ค</option>
              <option value="3">ง</option>
            </select>
          </label>
        </form>

        <div class="admin-actions">
          <button id="nextQuestionBtn" class="btn">Next</button>
          <button id="finishBtn" class="btn btn-secondary">Finish</button>
        </div>
      </section>

      <section class="card">
        <h2>Preview Questions</h2>
        <ul id="previewList" class="preview-list"></ul>
      </section>
    </main>

    <script type="module" src="js/admin.js"></script>
  </body>
</html>

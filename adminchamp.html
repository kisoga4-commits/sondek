<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Champ Dashboard</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <main class="container adminchamp-container">
      <header class="card">
        <h1>Admin Champ Dashboard</h1>
        <p class="muted">จัดการคอร์ส, รายชื่อนักเรียน และโปรไฟล์ครู แบบ Real-time</p>
      </header>

      <section class="admin-grid">
        <article class="card">
          <h2>สร้างบททดสอบ (Manage Quizzes)</h2>
          <a class="btn" href="template.html">+ ไปหน้า Template ทำแบบทดสอบ</a>
          <div class="table-wrap mt-12">
            <table class="admin-table">
              <thead>
                <tr>
                  <th>Course ID</th>
                  <th>ชื่อคอร์ส</th>
                  <th>สถานะ</th>
                  <th>จัดการ</th>
                </tr>
              </thead>
              <tbody id="courseTableBody"></tbody>
            </table>
          </div>
        </article>

        <article class="card">
          <h2>คอร์สที่เปิดสอน & รายชื่อนักเรียน</h2>
          <div id="activeCoursesWrap" class="stack-form"></div>
        </article>

        <article class="card">
          <h2>หน้าแก้ไขโปรไฟล์</h2>
          <form id="profileForm" class="stack-form">
            <label>ชื่อ
              <input type="text" id="profileName" required />
            </label>
            <label>ประวัติย่อ (Bio)
              <textarea id="profileBio" rows="3" required></textarea>
            </label>
            <label>Image URL
              <input type="url" id="profileImageUrl" required />
            </label>
            <label>ลิงก์หน้าโปรไฟล์ครู (CTA ปุ่มเขียว)
              <input type="url" id="profileUrl" required />
            </label>
            <button type="submit" class="btn btn-success">บันทึก</button>
          </form>
        </article>
      </section>
    </main>

    <script type="module" src="js/adminchamp.js"></script>
  </body>
</html>

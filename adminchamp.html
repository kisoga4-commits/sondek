<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>แอดมินส่วนตัว</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <main class="container home-layout">
      <section class="card">
        <h1>แผงแอดมิน (ใช้งานคนเดียว)</h1>
        <p class="muted">หน้าเรียบ ๆ รวม 4 โหมดหลักสำหรับจัดการงานประจำวัน</p>
      </section>

      <section class="card">
        <div class="mode-tabs" id="modeTabs">
          <button type="button" class="btn tab-btn is-active" data-mode="template">1) Template ข้อสอบ</button>
          <button type="button" class="btn btn-secondary tab-btn" data-mode="profile">2) แก้โปรไฟล์</button>
          <button type="button" class="btn btn-secondary tab-btn" data-mode="course">3) เปิด / ปิด คอร์ส</button>
          <button type="button" class="btn btn-secondary tab-btn" data-mode="qr">4) แปลงลิงก์เป็น QR</button>
        </div>

        <article class="mode-panel" data-panel="template">
          <h2>Template ทำข้อสอบ</h2>
          <p class="muted">ไปหน้าสร้างข้อสอบใหม่ (สุ่ม 10 ข้อจากคลังข้อสอบได้)</p>
          <a class="btn" href="template.html">ไปหน้า Template</a>
        </article>

        <article class="mode-panel hidden" data-panel="profile">
          <h2>แก้โปรไฟล์</h2>
          <form id="profileForm" class="stack-form">
            <label>ชื่อที่แสดง
              <input type="text" id="displayName" placeholder="เช่น ครูต้น" />
            </label>
            <label>คำอธิบายสั้น
              <textarea id="displayBio" rows="2" placeholder="สอนคอร์สออนไลน์"></textarea>
            </label>
            <button type="submit" class="btn">บันทึกโปรไฟล์ในเครื่องนี้</button>
          </form>
          <p id="profileStatus" class="muted"></p>
        </article>

        <article class="mode-panel hidden" data-panel="course">
          <h2>หน้าเปิด / ปิด คอร์ส</h2>
          <form id="courseToggleForm" class="stack-form">
            <label>ชื่อคอร์ส
              <input type="text" id="courseName" placeholder="เช่น ฟิสิกส์ ม.5" />
            </label>
            <label>สถานะ
              <select id="courseStatus">
                <option value="open">เปิดรับสมัคร</option>
                <option value="closed">ปิดรับสมัคร</option>
              </select>
            </label>
            <button type="submit" class="btn">บันทึกสถานะ</button>
          </form>
          <p id="courseStatusText" class="muted"></p>
        </article>

        <article class="mode-panel hidden" data-panel="qr">
          <h2>หน้าต่างแปลงลิงก์เป็น QR</h2>
          <div class="stack-form">
            <label>วางลิงก์
              <input type="url" id="qrLinkInput" placeholder="https://example.com/quiz" />
            </label>
            <button type="button" id="createQrBtn" class="btn">สร้าง QR</button>
            <img id="qrPreview" class="hidden" alt="QR Code" style="max-width:220px" />
          </div>
        </article>
      </section>
    </main>

    <script>
      const tabs = document.querySelectorAll('.tab-btn');
      const panels = document.querySelectorAll('.mode-panel');

      tabs.forEach((btn) => {
        btn.addEventListener('click', () => {
          const selectedMode = btn.dataset.mode;
          tabs.forEach((item) => {
            item.classList.remove('is-active');
            item.classList.add('btn-secondary');
          });
          btn.classList.add('is-active');
          btn.classList.remove('btn-secondary');

          panels.forEach((panel) => panel.classList.toggle('hidden', panel.dataset.panel !== selectedMode));
        });
      });

      const profileForm = document.getElementById('profileForm');
      const profileStatus = document.getElementById('profileStatus');
      profileForm.addEventListener('submit', (event) => {
        event.preventDefault();
        const profile = {
          name: document.getElementById('displayName').value.trim(),
          bio: document.getElementById('displayBio').value.trim(),
        };
        localStorage.setItem('solo_admin_profile', JSON.stringify(profile));
        profileStatus.textContent = 'บันทึกโปรไฟล์แล้ว';
      });

      const savedProfile = localStorage.getItem('solo_admin_profile');
      if (savedProfile) {
        const parsed = JSON.parse(savedProfile);
        document.getElementById('displayName').value = parsed.name || '';
        document.getElementById('displayBio').value = parsed.bio || '';
      }

      const courseToggleForm = document.getElementById('courseToggleForm');
      const courseStatusText = document.getElementById('courseStatusText');
      courseToggleForm.addEventListener('submit', (event) => {
        event.preventDefault();
        const payload = {
          name: document.getElementById('courseName').value.trim(),
          status: document.getElementById('courseStatus').value,
          updatedAt: new Date().toLocaleString('th-TH'),
        };
        localStorage.setItem('solo_course_status', JSON.stringify(payload));
        courseStatusText.textContent = `คอร์ส "${payload.name || '-'}" ถูกตั้งเป็น ${payload.status === 'open' ? 'เปิดรับสมัคร' : 'ปิดรับสมัคร'} (${payload.updatedAt})`;
      });

      const savedCourse = localStorage.getItem('solo_course_status');
      if (savedCourse) {
        const parsed = JSON.parse(savedCourse);
        document.getElementById('courseName').value = parsed.name || '';
        document.getElementById('courseStatus').value = parsed.status || 'open';
        courseStatusText.textContent = `สถานะล่าสุด: ${parsed.status === 'open' ? 'เปิดรับสมัคร' : 'ปิดรับสมัคร'} (${parsed.updatedAt || '-'})`;
      }

      document.getElementById('createQrBtn').addEventListener('click', () => {
        const link = document.getElementById('qrLinkInput').value.trim();
        if (!link) {
          alert('กรุณาใส่ลิงก์ก่อน');
          return;
        }

        const qrPreview = document.getElementById('qrPreview');
        qrPreview.src = `https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=${encodeURIComponent(link)}`;
        qrPreview.classList.remove('hidden');
      });
    </script>
  </body>
</html>

<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TOP ของแบบทดสอบ</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-gradient-to-b from-amber-50 to-orange-100 p-4 text-slate-900 md:p-8">
    <main class="mx-auto max-w-2xl space-y-4">
      <section class="rounded-3xl bg-white p-6 shadow-xl">
        <h1 class="text-3xl font-black text-orange-600">🏆 TOP 5 ของแบบทดสอบ</h1>
        <p id="topCourseTitle" class="mt-2 text-lg font-semibold text-slate-700">กำลังโหลด...</p>
        <p class="mt-1 text-sm text-slate-500">แสดงผู้ที่คะแนนดีที่สุด 5 อันดับของแบบทดสอบนี้</p>
      </section>

      <section class="rounded-3xl bg-white p-6 shadow-xl">
        <ol id="topList" class="space-y-3"></ol>
        <p id="emptyTop" class="hidden text-slate-500">ยังไม่มีผู้ทำแบบทดสอบ</p>
      </section>

      <a id="retryLink" href="#" class="block rounded-2xl bg-indigo-600 px-4 py-4 text-center text-lg font-black text-white">ทำแบบทดสอบอีกครั้ง</a>
    </main>

    <script type="module" src="js/top.js"></script>
  </body>
</html>

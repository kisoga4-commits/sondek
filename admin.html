<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 Not Found</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #020617;
        color: #cbd5e1;
        font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      }

      .code {
        font-size: clamp(3rem, 12vw, 5rem);
        font-weight: 800;
        letter-spacing: 0.06em;
        margin: 0;
      }

      .message {
        margin: 0.35rem 0 0;
        text-align: center;
        color: #94a3b8;
      }
    </style>
  </head>
  <body>
    <main aria-label="not found">
      <p class="code">404</p>
      <p class="message">Not Found</p>
    </main>
  </body>
</html>

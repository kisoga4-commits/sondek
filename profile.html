<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>โปรไฟล์ครู</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-gradient-to-b from-fuchsia-100 via-white to-emerald-100 p-4 text-slate-900 md:p-8">
    <main class="mx-auto max-w-3xl space-y-4">
      <section class="rounded-3xl bg-white p-6 shadow-xl">
        <div class="flex items-center justify-between gap-3">
          <h1 class="text-2xl font-black text-fuchsia-700 md:text-3xl">โปรไฟล์ครูผู้สอน</h1>
          <button id="closeBtn" type="button" class="rounded-xl bg-slate-200 px-4 py-2 text-sm font-bold text-slate-700">ปิด</button>
        </div>
        <p id="statusText" class="mt-3 rounded-xl bg-slate-100 px-3 py-2 text-sm font-semibold text-slate-600">กำลังโหลดข้อมูลโปรไฟล์...</p>
      </section>

      <section class="rounded-3xl bg-white p-6 shadow-xl">
        <div class="flex flex-col items-center gap-4 text-center md:flex-row md:items-start md:text-left">
          <img id="profileImage" alt="รูปโปรไฟล์ครู" class="h-40 w-40 rounded-3xl border border-fuchsia-100 object-cover shadow" />
          <div>
            <h2 id="profileName" class="text-2xl font-black text-slate-800">ชื่อครู</h2>
            <p id="profileBio" class="mt-2 whitespace-pre-line rounded-2xl bg-fuchsia-50 px-4 py-3 text-slate-700">-</p>
          </div>
        </div>
      </section>

      <section class="rounded-3xl bg-white p-6 shadow-xl">
        <h3 class="text-xl font-black text-indigo-700">รูปที่เคยสอน</h3>
        <p class="mt-1 text-sm font-semibold text-slate-500">สำหรับนักเรียนดูข้อมูลเท่านั้น (ไม่สามารถแก้ไขได้)</p>
        <div id="teachingGallery" class="mt-4 grid grid-cols-1 gap-3 sm:grid-cols-2"></div>
      </section>

      <section class="rounded-3xl bg-white p-6 shadow-xl">
        <a id="enrollLink" href="#" target="_blank" rel="noreferrer" class="block rounded-2xl bg-emerald-600 px-4 py-4 text-center text-lg font-black text-white">สนใจสมัครเรียน / ดูคอร์สที่เปิด</a>
      </section>
    </main>

    <div id="teachingImageModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-slate-900/75 p-4">
      <section class="relative w-full max-w-4xl rounded-2xl bg-white p-3 shadow-2xl">
        <button
          id="closeTeachingImageModal"
          type="button"
          class="absolute right-2 top-2 rounded-lg bg-slate-200 px-3 py-1 text-sm font-black text-slate-700"
        >
          ปิด
        </button>
        <img id="teachingImageModalPreview" alt="ภาพการสอนแบบขยาย" class="max-h-[85vh] w-full rounded-xl object-contain" />
      </section>
    </div>

    <script type="module" src="js/profile.js"></script>

    <a href="index.html" aria-label="กลับหน้าแรก" class="fixed bottom-4 right-4 z-40 grid h-12 w-12 place-items-center rounded-full bg-slate-900 text-xl text-white shadow-2xl ring-2 ring-emerald-400">🏠</a>
  </body>
</html>

<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Template ทำแบบทดสอบ</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <main class="container">
      <section class="card">
        <h1>Template ทำแบบทดสอบ</h1>
        <p class="muted">สร้างคอร์ส พร้อมผสมคำถาม 3 แบบในชุดเดียว (true_false, multiple_choice, ordering)</p>

        <form id="courseForm" class="stack-form">
          <label>Course ID
            <input type="text" id="courseId" value="course_02" required />
          </label>
          <label>ชื่อคอร์ส
            <input type="text" id="courseTitle" value="Course 2" required />
          </label>
        </form>
      </section>

      <section class="card">
        <h2>เพิ่มคำถาม</h2>
        <div class="stack-form">
          <label>ประเภทคำถาม
            <select id="questionType" required>
              <option value="multiple_choice">multiple_choice</option>
              <option value="true_false">true_false</option>
              <option value="ordering">ordering</option>
            </select>
          </label>

          <label>โจทย์
            <textarea id="questionText" rows="2" placeholder="พิมพ์โจทย์คำถาม" required></textarea>
          </label>

          <div id="templateMultipleChoice" class="question-template stack-form">
            <label>ตัวเลือก A <input type="text" id="mcChoiceA" /></label>
            <label>ตัวเลือก B <input type="text" id="mcChoiceB" /></label>
            <label>ตัวเลือก C <input type="text" id="mcChoiceC" /></label>
            <label>ตัวเลือก D <input type="text" id="mcChoiceD" /></label>
            <label>คำตอบที่ถูก
              <select id="mcAnswerIndex">
                <option value="0">A</option>
                <option value="1">B</option>
                <option value="2">C</option>
                <option value="3">D</option>
              </select>
            </label>
          </div>

          <div id="templateTrueFalse" class="question-template stack-form hidden">
            <p class="muted">ระบบจะสร้างตัวเลือกให้อัตโนมัติ: จริง / เท็จ</p>
            <label>คำตอบที่ถูก
              <select id="tfAnswerIndex">
                <option value="0">จริง</option>
                <option value="1">เท็จ</option>
              </select>
            </label>
          </div>

          <div id="templateOrdering" class="question-template stack-form hidden">
            <label>รายการที่ต้องเรียงลำดับ (1 บรรทัดต่อ 1 รายการ)
              <textarea id="orderingItems" rows="5" placeholder="ขั้นที่ 1&#10;ขั้นที่ 2&#10;ขั้นที่ 3"></textarea>
            </label>
            <p class="muted">บรรทัดบนสุดคือคำตอบลำดับที่ 1</p>
          </div>

          <div class="admin-actions">
            <button type="button" id="addQuestionBtn" class="btn">เพิ่มข้อนี้</button>
            <button type="button" id="seedMixedBtn" class="btn btn-secondary">ใส่ Template ตัวอย่าง 3 แบบ</button>
          </div>
        </div>
      </section>

      <section class="card">
        <h2>รายการคำถามในคอร์ส</h2>
        <ol id="questionPreview" class="preview-list"></ol>
        <p id="questionCounter" class="muted">ยังไม่มีข้อสอบ</p>
        <div class="admin-actions">
          <button type="button" id="saveCourseBtn" class="btn">บันทึกคอร์สและข้อสอบ</button>
          <a class="btn btn-secondary" href="adminchamp.html">กลับหน้า Dashboard</a>
        </div>
      </section>
    </main>
    <script type="module" src="js/template.js"></script>
  </body>
</html>

<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Template ทำแบบทดสอบ</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <main class="container">
      <section class="card" id="builderView">
        <h1>Template ทำแบบทดสอบ</h1>
        <p class="muted">สร้าง/แก้ไขคอร์สแล้วบันทึกขึ้น Firebase ทันที จากนั้นนำลิงก์ไปใช้ที่ Funnel นักเรียน</p>

        <form id="quizMetaForm" class="stack-form">
          <label>รหัสคอร์ส (courseId)
            <input id="quizCourseId" type="text" placeholder="เช่น course-math-basic" required />
          </label>
          <label>ชื่อแบบทดสอบ
            <input id="quizTitle" type="text" placeholder="เช่น Pre-test คณิตศาสตร์" required />
          </label>
          <label>คำอธิบาย
            <textarea id="quizDescription" rows="2" placeholder="ข้อความก่อนเริ่มทำข้อสอบ"></textarea>
          </label>
          <label>ลิงก์สมัครคอร์ส / คอร์สที่เปิดสอน
            <input id="enrollmentUrl" type="url" placeholder="เช่น https://..." />
          </label>
          <label>จำนวนข้อที่สุ่มต่อครั้ง
            <input id="drawCount" type="number" min="1" value="10" required />
          </label>
          <label>สถานะคอร์ส
            <select id="courseStatus">
              <option value="open">เปิดอยู่</option>
              <option value="closed">ปิดแล้ว</option>
            </select>
          </label>
        </form>

        <hr />
        <h2>แก้ไขคำถาม (ฐาน 20 ข้อ)</h2>
        <form id="questionEditor" class="editor-layout">
          <div class="editor-main stack-form">
            <label>โจทย์คำถาม
              <textarea id="questionText" rows="2" required placeholder="พิมพ์โจทย์คำถาม"></textarea>
            </label>
            <div id="answerEditor" class="answer-box"></div>
          </div>

          <aside class="editor-side stack-form">
            <h3>ตั้งค่าคำถาม</h3>
            <label>ประเภทคำถาม
              <input id="questionTypeLabel" type="text" required value="คณิตศาสตร์พื้นฐาน" />
            </label>
            <label>รูปแบบคำตอบ
              <select id="questionAnswerMode" required>
                <option value="multiple_choice">ตัวเลือก 4 ข้อ</option>
                <option value="true_false">จริง / เท็จ</option>
              </select>
            </label>
            <label>เวลา (วินาที)
              <input id="questionTimeLimit" type="number" min="5" value="30" required />
            </label>
            <label>คะแนน
              <input id="questionPoints" type="number" min="1" value="10" required />
            </label>
            <div class="admin-actions">
              <button type="submit" class="btn" id="addOrUpdateBtn">เพิ่มคำถาม</button>
              <button type="button" class="btn btn-secondary hidden" id="cancelEditBtn">ยกเลิกแก้ไข</button>
            </div>
          </aside>
        </form>
      </section>

      <section class="card" id="questionBankView">
        <h2>คลังคำถาม</h2>
        <p id="bankSummary" class="muted">กำลังโหลด...</p>
        <ol id="questionBankList" class="preview-list"></ol>

        <div class="admin-actions">
          <button type="button" id="seedDefaultBtn" class="btn btn-secondary">เติมโจทย์มาตรฐาน 20 ข้อ</button>
          <button type="button" id="saveCourseBtn" class="btn">บันทึกคอร์สขึ้น Firebase</button>
          <a href="adminchamp.html" class="btn btn-secondary">กลับหน้าแอดมิน</a>
        </div>

        <div id="sharePanel" class="hidden">
          <label>ลิงก์แบบทดสอบ
            <input id="quizLinkOutput" readonly />
          </label>
          <div class="admin-actions">
            <button type="button" class="btn" id="copyLinkBtn">คัดลอกลิงก์</button>
          </div>
          <img id="qrOutput" alt="QR ลิงก์แบบทดสอบ" class="hidden" style="max-width:220px" />
        </div>
      </section>
    </main>

    <script type="module" src="js/template.js"></script>
  </body>
</html>

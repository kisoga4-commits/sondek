<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Template ทำแบบทดสอบ</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <main class="container">
      <section class="card" id="builderView">
        <h1>ตัวสร้างข้อสอบแบบรวมคลังคำถาม</h1>
        <p class="muted">สร้างเกิน 10 ข้อ แล้วระบบจะสุ่ม 10 ข้อให้ผู้เรียนต่อครั้ง (ไม่ซ้ำกันในครั้งเดียว)</p>

        <form id="quizMetaForm" class="stack-form">
          <label>ชื่อแบบทดสอบ
            <input id="quizTitle" type="text" placeholder="เช่น Pre-test วิทยาศาสตร์" required />
          </label>
          <label>คำอธิบาย
            <textarea id="quizDescription" rows="2" placeholder="ข้อความก่อนเริ่มทำข้อสอบ"></textarea>
          </label>
        </form>

        <hr />
        <h2>แก้ไขคำถาม (โครงสร้างร่วมเดียว)</h2>
        <form id="questionEditor" class="stack-form">
          <label>โจทย์คำถาม
            <textarea id="questionText" rows="2" required placeholder="พิมพ์โจทย์คำถาม"></textarea>
          </label>

          <div class="inline-grid">
            <label>ประเภทคำถาม
              <select id="questionType" required>
                <option value="multiple_choice">multiple_choice</option>
                <option value="true_false">true_false</option>
                <option value="ordering">ordering</option>
              </select>
            </label>
            <label>เวลา (วินาที)
              <input id="questionTimeLimit" type="number" min="5" value="30" required />
            </label>
            <label>คะแนน
              <input id="questionPoints" type="number" min="1" value="10" required />
            </label>
          </div>

          <div id="answerEditor" class="answer-box"></div>

          <div class="admin-actions">
            <button type="submit" class="btn" id="addOrUpdateBtn">เพิ่มคำถาม</button>
            <button type="button" class="btn btn-secondary hidden" id="cancelEditBtn">ยกเลิกแก้ไข</button>
          </div>
        </form>
      </section>

      <section class="card" id="questionBankView">
        <h2>คลังคำถาม</h2>
        <p id="bankSummary" class="muted">ยังไม่มีคำถาม</p>
        <ol id="questionBankList" class="preview-list"></ol>

        <div class="admin-actions">
          <button type="button" id="buildQuizLinkBtn" class="btn">สร้างลิงก์ให้เด็กทำข้อสอบ</button>
          <a href="adminchamp.html" class="btn btn-secondary">กลับหน้าแอดมิน</a>
        </div>

        <div id="sharePanel" class="hidden">
          <label>ลิงก์แบบทดสอบ
            <input id="quizLinkOutput" readonly />
          </label>
          <div class="admin-actions">
            <button type="button" class="btn" id="copyLinkBtn">คัดลอกลิงก์</button>
          </div>
          <img id="qrOutput" alt="QR ลิงก์แบบทดสอบ" class="hidden" style="max-width:220px" />
        </div>
      </section>

      <section class="card hidden" id="studentView">
        <h1 id="studentQuizTitle"></h1>
        <p id="studentQuizDescription" class="muted"></p>

        <form id="studentNameForm" class="stack-form">
          <label>ชื่อนักเรียน
            <input id="studentName" type="text" required placeholder="กรอกชื่อก่อนเริ่ม" />
          </label>
          <button class="btn" type="submit">เริ่มทำข้อสอบ</button>
        </form>

        <div id="attemptView" class="hidden">
          <div class="progress-wrap">
            <div class="progress-label">
              <strong id="progressText"></strong>
              <span id="pointText"></span>
            </div>
            <div class="progress-bar"><div id="progressFill"></div></div>
          </div>

          <h2 id="attemptQuestionText"></h2>
          <p id="attemptTimerText" class="pill"></p>
          <div id="attemptAnswerArea"></div>

          <div class="quiz-actions">
            <button type="button" class="btn" id="nextBtn">ถัดไป</button>
            <button type="button" class="btn hidden" id="finishBtn">ส่งคำตอบ (Finish)</button>
          </div>
        </div>
      </section>

      <section class="card hidden" id="resultView">
        <h2>ผลการทำแบบทดสอบ</h2>
        <p id="resultHeadline"></p>
        <ul>
          <li id="resultScore"></li>
          <li id="resultPercentage"></li>
          <li id="resultCorrectCount"></li>
        </ul>

        <h3>ทบทวนคำตอบ (10 ข้อที่ถูกสุ่ม)</h3>
        <ol id="reviewList" class="preview-list"></ol>
      </section>
    </main>

    <script type="module" src="js/template.js"></script>
  </body>
</html>

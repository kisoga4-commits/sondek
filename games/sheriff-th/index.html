<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>จ่ายส่วย</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <main class="table-ui">
      <section class="top-bar card">
        <div class="mode-title">💸 จ่ายส่วย</div>
        <div id="gameStatus" class="top-chips"></div>
        <div class="top-actions">
          <a class="btn btn-secondary btn-mini" href="../../index.html">🏠 Home</a>
          <a class="btn btn-secondary btn-mini" href="../../duel.html">กลับ Duel</a>
          <button type="button" class="btn btn-secondary btn-mini" data-open-modal="stepsModal">วิธีเล่น</button>
        </div>
      </section>

      <section class="card setup-card" id="setupCard">
        <h2>เริ่มเกม</h2>
        <p id="hostOnlyHint" class="muted"></p>
        <label>จำนวนรอบตำรวจต่อคน
          <select id="roundsPerPlayerInput">
            <option value="1">1 รอบ</option>
            <option value="2">2 รอบ</option>
          </select>
        </label>
        <ul id="duelPlayersPreview" class="player-list"></ul>
        <div class="actions">
          <button type="button" id="startGameBtn" class="btn">เริ่มโหมดจ่ายส่วย</button>
        </div>
        <p id="setupError" class="error hidden"></p>
      </section>

      <section class="card game-card hidden" id="gameCard">
        <div class="table-center">
          <div id="deckStatus" class="center-pile"></div>
          <div id="scoreMiniBoard" class="score-mini-board"></div>
        </div>

        <div class="player-focus">
          <div class="focus-head">
            <div id="playerIdentity" class="identity-banner"></div>
            <p id="phaseGuide" class="muted"></p>
          </div>

          <div id="playerHandCards" class="hand-row"></div>
          <div id="playerHandSummary" class="mini-info"></div>
        </div>

        <div id="inspectionSummary" class="inspect-focus"></div>

        <div class="action-bar" id="phaseActions"></div>

        <section class="bottom-info">
          <p id="eventLog" class="muted event-log"></p>
        </section>

        <div class="hidden-controls hidden">
          <select id="merchantCardTypeInput"></select>
          <input id="merchantQtyInput" type="number" min="1" max="4" value="1" />
          <button type="button" id="discardRedrawBtn">discard</button>
          <button type="button" id="addBagBtn">add bag</button>
          <button type="button" id="clearBagBtn">clear bag</button>
          <button type="button" id="submitBagBtn">submit bag</button>
          <button type="button" id="reshuffleBtn">reshuffle</button>
          <select id="inspectMerchantInput"></select>
          <select id="inspectionActionInput">
            <option value="inspect">inspect</option>
            <option value="pass">pass</option>
          </select>
          <input id="inspectionBribeInput" type="number" min="0" max="50" value="0" />
          <button type="button" id="resolveInspectionBtn">resolve</button>
          <button type="button" id="nextSheriffBtn">next</button>
          <button type="button" id="finishGameBtn">finish</button>
        </div>
      </section>

      <section class="card hidden" id="resultCard">
        <h2>จบเกม</h2>
        <p id="winnerText"></p>
        <div id="winnerDetail" class="muted"></div>
        <div class="actions">
          <button type="button" id="restartGameBtn" class="btn">เริ่มเกมใหม่</button>
        </div>
      </section>
    </main>

    <dialog id="stepsModal">
      <h3>ลำดับการเล่น</h3>
      <ul class="steps-list">
        <li><span>1️⃣</span> แจกการ์ด + เลือกทิ้ง 0-3 ใบ</li>
        <li><span>2️⃣</span> จัดกระเช้า 0-4 ใบ</li>
        <li><span>3️⃣</span> ตำรวจตรวจทีละคน (เปิดตรวจ / รับสินบน)</li>
        <li><span>4️⃣</span> สรุปรอบ</li>
        <li><span>5️⃣</span> จบเกมและเปิดโบนัสทั้งหมด</li>
      </ul>
      <form method="dialog"><button class="btn">ปิด</button></form>
    </dialog>

    <dialog id="bribeModal">
      <h3>ส่งส่วย</h3>
      <p id="bribeModalHint" class="muted"></p>
      <label>จำนวนเงินส่วย
        <input id="bribeModalAmountInput" type="number" min="0" step="1" value="5" />
      </label>
      <div class="actions">
        <button type="button" class="btn btn-secondary" id="cancelBribeBtn">ยกเลิก</button>
        <button type="button" class="btn" id="confirmBribeBtn">ยืนยันส่งส่วย</button>
      </div>
    </dialog>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
